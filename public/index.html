<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetWatcher</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/globe.gl@2.35.1/dist/globe.gl.min.js"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="13" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25" class="logo-ring logo-ring-3"/>
          <circle cx="16" cy="16" r="9"  fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"  class="logo-ring logo-ring-2"/>
          <circle cx="16" cy="16" r="5"  fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.85" class="logo-ring logo-ring-1"/>
          <circle cx="16" cy="16" r="2.2" fill="currentColor"/>
        </svg>
      </span>
      <h1 data-text="NetWatcher" class="neon-title"><span class="title-inner">NetWatcher</span></h1>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Connecting...</span>
    </div>
    <div class="header-right">
      <span id="processCount">0 processes</span>
      <span class="separator">|</span>
      <span id="connectionCount">0 connections</span>
    </div>
  </header>

  <div class="host-info-bar" id="hostInfoBar">
    <div class="host-info-item">
      <span class="host-label">Hostname</span>
      <span class="host-value" id="hostHostname">--</span>
    </div>
    <div class="host-info-item">
      <span class="host-label">Local IP</span>
      <span class="host-value" id="hostLocalIP">--</span>
    </div>
    <div class="host-info-item">
      <span class="host-label">Public IP</span>
      <span class="host-value" id="hostPublicIP">--</span>
    </div>
    <div class="host-info-item">
      <span class="host-label">Location</span>
      <span class="host-value" id="hostLocation">--</span>
    </div>
    <div class="host-info-item">
      <span class="host-label">ISP</span>
      <span class="host-value" id="hostISP">--</span>
    </div>
  </div>

  <div class="content-layout">
    <div class="left-panel">
      <div class="filters-bar">
        <div class="filter-group">
          <label class="filter-toggle">
            <input type="checkbox" id="filterIPv6"> Exclude IPv6
          </label>
          <label class="filter-toggle">
            <input type="checkbox" id="filterPrivate"> Exclude Private IPs
          </label>
          <label class="filter-toggle">
            <input type="checkbox" id="filterSystem"> Hide System Processes
          </label>
        </div>
        <div class="filter-group">
          <button class="toolbar-btn" id="refreshNowBtn" title="Fetch connections and host info now">&#8634; Refresh Now</button>
          <label class="sort-label">Refresh:
            <select class="sort-select" id="refreshSelect">
              <option value="2000">Live (2s)</option>
              <option value="10000">10s</option>
              <option value="30000">30s</option>
              <option value="60000">1m</option>
              <option value="300000">5m</option>
              <option value="600000">10m</option>
            </select>
          </label>
          <button class="toolbar-btn" id="blockedListBtn" title="View blocked IPs and history">Blocked IPs</button>
          <button class="toolbar-btn" id="expandAllBtn" title="Expand All">Expand All</button>
          <button class="toolbar-btn" id="collapseAllBtn" title="Collapse All">Collapse All</button>
          <label class="sort-label">Sort:
            <select class="sort-select" id="sortSelect">
              <option value="connections">Connections</option>
              <option value="pid">PID</option>
              <option value="name">Name</option>
            </select>
          </label>
          <input type="text" class="search-input" id="searchInput" placeholder="Search process name or IP...">
        </div>
      </div>
      <div id="app">
        <div class="loading">Loading connections...</div>
      </div>
    </div>
    <div class="right-panel">
      <div class="globe-container" id="globeContainer">
        <button class="globe-fullscreen-btn" id="globeFullscreenBtn" title="Toggle fullscreen (Esc to exit)" aria-label="Toggle fullscreen">
          <svg class="icon-expand" viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M2 6V2h4M14 6V2h-4M2 10v4h4M14 10v4h-4"/>
          </svg>
          <svg class="icon-collapse" viewBox="0 0 16 16" width="16" height="16" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M6 2v4H2M10 2v4h4M6 14v-4H2M10 14v-4h4"/>
          </svg>
          <span class="fs-label">FS</span>
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
